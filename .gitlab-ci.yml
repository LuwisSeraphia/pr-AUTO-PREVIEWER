stages:
  - pre_review

# MR pre-review gate: only runs for merge requests.
pre_review:
  stage: pre_review
  image: python:3.11-slim
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  cache:
    key: "${CI_COMMIT_REF_SLUG}-pip"
    paths:
      - .cache/pip
  before_script:
    - python -m pip install --upgrade pip
    - pip install ruff==0.4.8
  script:
    - python tools/pre-review/scripts/run_pre_review.py
  artifacts:
    when: always
    paths:
      - tools/pre-review/out/rule_results.json
